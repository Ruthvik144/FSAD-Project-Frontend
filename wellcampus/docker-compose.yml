version: '3.8'

services:
  # Spring Boot Backend
  api:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MYSQLHOST=db
      - MYSQLPORT=3306
      - MYSQLDATABASE=wellcampus_db
      - MYSQLUSER=root
      - MYSQLPASSWORD=root
    depends_on:
      db:
        condition: service_healthy

  # MySQL Database
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=wellcampus_db
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  # React Frontend (Optional, assuming you serve it locally or via Vite)
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - api

volumes:
  db_data:
